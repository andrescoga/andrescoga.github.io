<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="More Artists — Andrés Escobar">
    <title>More Artists — Andrés Escobar</title>
    <link rel="icon" href="../favicon.ico">
    <link rel="stylesheet" href="../css/style.css">
    <script src="../js/theme.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
    <script src="../js/project-videos.js" defer></script>
    <style>
        .project-section + .project-section { margin-top: 16px; }
        .project-video { border-radius: 0; }
        .project-video-pair--rounded .project-video { border-radius: 5px; }

        .project-video,
        .project-video-pair { position: relative; }

        .video-role-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: flex-start;
            justify-content: flex-start;
            padding: 16px;
            opacity: 0;
            transition: opacity 0.2s ease;
            pointer-events: none;
            z-index: 2;
        }

        .video-role-overlay span {
            font-size: clamp(1.5rem, 3vw, 2.5rem);
            font-weight: 800;
            color: white;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.6);
            letter-spacing: -0.01em;
        }

        .project-video:hover .video-role-overlay {
            opacity: 1;
        }

        .project-video:hover video {
            filter: brightness(0.5);
        }

        .project-video.is-playing:hover .video-role-overlay {
            opacity: 0;
        }

        .project-video.is-playing:hover video {
            filter: none;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <a href="../index.html" class="logo">Andrés Escobar</a>
            <nav>
                <ul>
                    <li><a href="../index.html">Home</a></li>
                    <li><a href="../snippets.html">Snippets</a></li>
                </ul>
                <button class="theme-toggle" aria-label="Toggle dark mode">
                    <svg class="vertical-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="2" x2="12" y2="22"/></svg>
                    <svg class="horizontal-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="2" y1="12" x2="22" y2="12"/></svg>
                </button>
            </nav>
        </div>
    </header>

    <main>

                        </video>

                    <div class="project-video">
                        <video controls preload="metadata" poster="../images/more/liltjay.png">

                        </video>
                        <div class="video-role-overlay"><span>Shooter & Editor</span></div>
                    </div>

            </section>

            <!-- Marco Luka -->
            <section class="project-section">
                <div class="project-video">
                    <video controls preload="metadata" poster="../images/more/marco.png">
                        <source src="https://index-videos.b-cdn.net/marco_luka_-_big_talk_(lyric_video)%20(1080p).mp4" type="video/mp4">

            </section>

                    </div>
                    <div class="project-video">
                        <video controls preload="metadata" poster="../images/more/beam.png">
                            <source src="https://other-work.b-cdn.net/Beam_Fu_BTS_16x9_v01-1.mp4" type="video/mp4">

                    <div class="project-video project-video--vertical">

                        </video>
                    </div>
                    <div class="project-video project-video--vertical">

        </div>
    </main>

    <script>
        document.querySelectorAll('video:not([autoplay]):not([data-autoplay])').forEach(video => {
            const container = video.closest('.project-video');
            video.removeAttribute('controls');
            video.addEventListener('mouseenter', () => video.setAttribute('controls', ''));
            video.addEventListener('mouseleave', () => {
                if (!video.paused) return;
                video.removeAttribute('controls');
            });
            video.addEventListener('play', () => container && container.classList.add('is-playing'));
            video.addEventListener('pause', () => container && container.classList.remove('is-playing'));
            video.addEventListener('ended', () => container && container.classList.remove('is-playing'));
        });
    </script>

    <footer>
        <div class="container">
            <p>© 2026</p>
        </div>
    </footer>
</body>
</html>
