<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="More Artists — Andrés Escobar">
    <title>More Artists — Andrés Escobar</title>
    <link rel="icon" href="../favicon.ico">
    <link rel="stylesheet" href="../css/style.css">
    <script src="../js/theme.js"></script>
    <style>
        .project-section + .project-section { margin-top: 16px; }
        .project-video { border-radius: 0; }
        .project-video-pair--rounded .project-video { border-radius: 5px; }

        .project-video,
        .project-video-pair { position: relative; }

        .video-caption {
            position: absolute;
            bottom: 10px;
            left: 12px;
            margin: 0;
            font-size: 0.7rem;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.75);
            pointer-events: none;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <a href="../index.html" class="logo">Andrés Escobar</a>
            <nav>
                <ul>
                    <li><a href="../index.html">Home</a></li>
                    <li><a href="../snippets.html">Snippets</a></li>
                </ul>
                <button class="theme-toggle" aria-label="Toggle dark mode">
                    <svg class="vertical-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="2" x2="12" y2="22"/></svg>
                    <svg class="horizontal-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="2" y1="12" x2="22" y2="12"/></svg>
                </button>
            </nav>
        </div>
    </header>

    <main>
        <div class="project-detail">

            <!-- Lil Tjay -->
            <section class="project-section">
                <div class="project-video-pair">
                    <div class="project-video">
                        <video controls preload="metadata" poster="../images/more/moveon.png">
                            <source src="https://other-work.b-cdn.net/Lil%20Tjay%20-%20Move%20On%20(Trailer).mp4" type="video/mp4">
                        </video>
                    </div>
                    <div class="project-video">
                        <video controls preload="metadata" poster="../images/more/liltjay.png">
                            <source src="https://other-work.b-cdn.net/LilTjay_Plaques_RC01.mp4" type="video/mp4">
                        </video>
                    </div>
                    <p class="video-caption">Lil Tjay — Shooter, Editor, Motion</p>
                </div>
            </section>

            <!-- Marco Luka -->
            <section class="project-section">
                <div class="project-video">
                    <video controls preload="metadata" poster="../images/more/marco.png">
                        <source src="https://index-videos.b-cdn.net/marco_luka_-_big_talk_(lyric_video)%20(1080p).mp4" type="video/mp4">
                    </video>
                    <p class="video-caption">Marco Luka — Motion Designer</p>
                </div>
            </section>

            <!-- Hozier + Beam -->
            <section class="project-section">
                <div class="project-video-pair">
                    <div class="project-video">
                        <video controls preload="metadata" poster="../images/more/hozier.png">
                            <source src="https://other-work.b-cdn.net/Almost%20(Sweet%20Music)%20%5BProgram%20Only%5D%20%5BBehind%20The%20Scenes%5D.mp4" type="video/mp4">
                        </video>
                    </div>
                    <div class="project-video">
                        <video controls preload="metadata" poster="../images/more/beam.png">
                            <source src="https://other-work.b-cdn.net/Beam_Fu_BTS_16x9_v01-1.mp4" type="video/mp4">
                        </video>
                    </div>
                    <p class="video-caption">Hozier / Beam — Shooter, Editor</p>
                </div>
            </section>

            <!-- Vertical trio (Prince) -->
            <section class="project-section">
                <div class="project-video-pair project-video-pair--rounded">
                    <div class="project-video project-video--vertical">
                        <video autoplay loop muted playsinline preload="metadata">
                            <source src="https://other-work.b-cdn.net/prince-3d.mp4" type="video/mp4">
                        </video>
                    </div>
                    <div class="project-video project-video--vertical">
                        <video autoplay loop muted playsinline preload="metadata">
                            <source src="https://other-work.b-cdn.net/Prince_Musicology_Spatial-Asset_4x5_v02.mp4" type="video/mp4">
                        </video>
                    </div>
                    <div class="project-video project-video--vertical">
                        <video autoplay loop muted playsinline preload="metadata">
                            <source src="https://other-work.b-cdn.net/prince-3d.mp4" type="video/mp4">
                        </video>
                    </div>
                </div>
            </section>

            <!-- Prince -->
            <section class="project-section">
                <div class="project-video">
                    <video controls preload="metadata" poster="../images/more/prince.png">
                        <source src="https://index-videos.b-cdn.net/prince_-_musicology__real_music_by_real_musicians_(20th_anniversary)%20(1080p).mp4" type="video/mp4">
                    </video>
                    <p class="video-caption">Prince — Editor</p>
                </div>
            </section>

            <!-- Shakira -->
            <section class="project-section">
                <div class="project-video">
                    <video controls preload="metadata" poster="../images/more/shakira.png">
                        <source src="https://index-videos.b-cdn.net/shakira_-_20_years_of_laundry_service%20(1080p).mp4" type="video/mp4">
                    </video>
                    <p class="video-caption">Shakira — Editor</p>
                </div>
            </section>

            <!-- Shakira vertical trio -->
            <section class="project-section">
                <div class="project-video-pair">
                    <div class="project-video project-video--vertical">
                        <video autoplay loop muted playsinline preload="metadata">
                            <source src="https://other-work.b-cdn.net/Shakira_Oral-Fixation_Ad_ES_15_4x5_v01.mp4" type="video/mp4">
                        </video>
                    </div>
                    <div class="project-video project-video--vertical">
                        <video autoplay loop muted playsinline preload="metadata">
                            <source src="https://other-work.b-cdn.net/Shakira_Oral_Fixation_Giveaway-Asset_10_%5BES%5D_4x5_v02.mp4" type="video/mp4">
                        </video>
                    </div>
                    <div class="project-video project-video--vertical">
                        <video autoplay loop muted playsinline preload="metadata">
                            <source src="https://other-work.b-cdn.net/Shakira_Pies-Descalzos_Ad_ES_Out-Now_4x5_v01.mp4" type="video/mp4">
                        </video>
                    </div>
                </div>
            </section>

            <!-- Miles Electric Band -->
            <section class="project-section">
                <div class="project-video">
                    <video controls preload="metadata">
                        <source src="https://index-videos.b-cdn.net/m.e.b._-_the_making_of__that_you_not_dare_to_forget_%20(1080p).mp4" type="video/mp4">
                    </video>
                    <p class="video-caption">Miles Electric Band — Editor</p>
                </div>
            </section>

        </div>
    </main>

    <script>
        document.querySelectorAll('video:not([autoplay])').forEach(video => {
            video.removeAttribute('controls');
            video.addEventListener('mouseenter', () => video.setAttribute('controls', ''));
            video.addEventListener('mouseleave', () => {
                if (!video.paused) return;
                video.removeAttribute('controls');
            });
        });
    </script>

    <footer>
        <div class="container">
            <p>© 2026</p>
        </div>
    </footer>
</body>
</html>
